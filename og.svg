  <text x="80" y="450" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="500" fill="#a4adbf">AI design agent for founders building AI products.</text>
  <text x="80" y="555" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="22" font-weight="600" fill="#22d3ee">superdesign.dev</text>
